name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.platform }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> target

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python deps
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Python sidecar (Unix)
        if: runner.os != 'Windows'
        shell: bash
        working-directory: backend
        run: |
          mkdir -p ../src-tauri/binaries
          pyinstaller --clean --noconfirm --onefile --name dailyiq-sidecar --add-data "../data/tickers.json:data" main.py
          pyinstaller --clean --noconfirm --onefile --name dailyiq-worker --add-data "../data/tickers.json:data" worker_watchlist.py
          cp dist/dailyiq-sidecar "../src-tauri/binaries/dailyiq-sidecar-${{ matrix.target }}"
          cp dist/dailyiq-worker "../src-tauri/binaries/dailyiq-worker-${{ matrix.target }}"

      - name: Build Python sidecar (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        working-directory: backend
        run: |
          New-Item -ItemType Directory -Force -Path ..\src-tauri\binaries | Out-Null
          pyinstaller --clean --noconfirm --onefile --name dailyiq-sidecar --add-data "..\data\tickers.json;data" main.py
          pyinstaller --clean --noconfirm --onefile --name dailyiq-worker --add-data "..\data\tickers.json;data" worker_watchlist.py
          Copy-Item dist/dailyiq-sidecar.exe "..\src-tauri\binaries\dailyiq-sidecar-${{ matrix.target }}.exe"
          Copy-Item dist/dailyiq-worker.exe "..\src-tauri\binaries\dailyiq-worker-${{ matrix.target }}.exe"

      - name: Install frontend deps
        run: npm ci

      - name: Install Linux deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: DailyIQ ${{ github.ref_name }}
          releaseBody: See assets for downloadable installers.
          releaseDraft: true
          args: --target ${{ matrix.target }}