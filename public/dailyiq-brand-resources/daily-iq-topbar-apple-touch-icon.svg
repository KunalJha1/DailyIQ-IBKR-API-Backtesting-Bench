<svg xmlns="http://www.w3.org/2000/svg"
     width="180"
     height="180"
     viewBox="0 0 180 180">
  <defs>
    <linearGradient id="iconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
  </defs>

  <!-- White background (Apple rounds corners automatically) -->
  <rect x="0" y="0" width="180" height="180" rx="36" fill="#ffffff" />

  <!-- Icon group (centered) -->
  <g transform="translate(90 90)">
    <!-- Main circle -->
    <circle cx="0" cy="0" r="52" fill="url(#iconGradient)" />

    <!-- Signal waves -->
    <path d="M -24 6 Q -16 -8 -8 -4 T 8 -12 T 24 -20"
          stroke="#ffffff"
          stroke-width="5"
          fill="none"
          stroke-linecap="round" />

    <path d="M -24 18 Q -16 4 -8 8 T 8 0 T 24 -2"
          stroke="#ffffff"
          stroke-width="4"
          fill="none"
          stroke-linecap="round"
          opacity="0.6" />

    <!-- Accent dot -->
    <circle cx="24" cy="-20" r="5" fill="#ffffff" />
  </g>
</svg>
